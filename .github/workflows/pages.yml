name: Pages公開

# docs/ が更新されたら(=毎日の抽出pushで) Actions 経由で公開する。
# GitHub任せの「legacy」ビルダーは遅延/滞留があるため、Actionsデプロイに切替。
on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      # GitHub Pages 配信基盤は一時的に "try again later" で失敗することがある。
      # 失敗が続く時間帯をまたげるよう、間隔を広げて最大5回まで再試行する(計~20分)。
      - id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.d1.outcome == 'failure'
        run: sleep 120
      - id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 180
      - id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure' && steps.d3.outcome == 'failure'
        run: sleep 300
      - id: d4
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure' && steps.d3.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure' && steps.d3.outcome == 'failure' && steps.d4.outcome == 'failure'
        run: sleep 420
      - id: d5
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure' && steps.d3.outcome == 'failure' && steps.d4.outcome == 'failure'
        uses: actions/deploy-pages@v4
