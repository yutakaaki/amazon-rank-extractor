name: 本日発売コミック抽出

on:
  # 定期実行は信頼性の高い「自宅Mac(launchd)」が担う。
  # GitHub側のcronは遅延/スキップが多いため使わず、手動トリガーのみ残す(クラウド予備)。
  workflow_dispatch:
    inputs:
      tag:
        description: '0600 か 1800 (空なら実行時刻から自動判定)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: extract
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo # 朝/夕の判定と日付をJSTで行う
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存インストール
        run: npm ci || npm install

      - name: Chromium 準備
        run: npx playwright install --with-deps chromium

      - name: 抽出実行
        run: node src/daily.js ${{ github.event.inputs.tag }}

      - name: 結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results snapshots
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "auto: $(date '+%F %H:%M') 抽出結果"
            git pull --rebase --autostash || true
            git push
          fi
